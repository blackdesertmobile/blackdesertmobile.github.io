<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>검은사막 모바일 | 공식 모험가 체크리스트</title>
    <link rel="shortcut icon" href="https://s1.blackdesertm.com/KR/Forum/BDM/Upload/WIKI/c0e9e49633320260310185122615.png">
    <style>
        /* [필수 규칙] 레이아웃 안정성 및 호환성 */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; padding: 10px; background-color: transparent; 
            font-family: 'Malgun Gothic', sans-serif; 
        }

        .container {
            width: 100%; max-width: 550px; margin: 0 auto;
            background: #ffffff; border: 2px solid #d4af37; border-radius: 12px;
            overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }

        /* 헤더 디자인 */
        .header {
            background: linear-gradient(135deg, #4e342e 0%, #212121 100%);
            padding: 25px 15px; text-align: center; border-bottom: 3px solid #d4af37;
        }
        .header h1 { margin: 0; font-size: 20px; color: #ffffff; letter-spacing: 1px; }
        .sync_text { font-size: 11px; color: #d4af37; margin-top: 8px; font-weight: bold; }

        /* 카테고리 바 */
        .cate_bar {
            background: #f5f5f5; padding: 12px 15px; border-bottom: 1px solid #e0e0e0;
            font-size: 15px; font-weight: bold; color: #5d4037; display: flex; justify-content: space-between;
        }
        .cate_bar .reset_info { font-weight: normal; font-size: 11px; color: #9e9e9e; }

        /* 체크리스트 항목 */
        .list_item {
            display: flex; align-items: center; padding: 14px 15px;
            border-bottom: 1px solid #f1f1f1; cursor: pointer; transition: 0.2s;
        }
        .list_item:hover { background: #fffcf0; }
        .list_item:last-child { border-bottom: none; }

        /* 커스텀 체크박스 */
        input[type="checkbox"] {
            width: 24px; height: 24px; margin-right: 15px; cursor: pointer;
            accent-color: #8c5326; flex-shrink: 0;
        }

        /* 텍스트 스타일 */
        .txt { font-size: 16px; color: #333; font-weight: bold; line-height: 1.4; }
        input:checked + .txt { color: #bdbdbd; text-decoration: line-through; }

        /* 하단 버튼 */
        .footer { background: #fafafa; padding: 20px; text-align: center; border-top: 1px solid #eee; }
        .reset_btn {
            background: #455a64; color: #ffffff; border: none; padding: 10px 30px;
            border-radius: 5px; cursor: pointer; font-size: 13px; font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>📜 신규 모험가 콘텐츠 체크리스트!</h1>
        <div id="status" class="sync_text">● 잊은 콘텐츠는 없는지 같이 확인해볼까요?</div>
    </div>

    <!-- 1. 일일 숙제 -->
    <div class="cate_bar">☀️ 일일 숙제 <span class="reset_info">매일 00:00 초기화</span></div>
    <div id="daily_list">
        <label class="list_item"><input type="checkbox" class="chk" data-type="daily" data-id="d1"><span class="txt">모험의 열기 소모</span></label>
        <label class="list_item"><input type="checkbox" class="chk" data-type="daily" data-id="d2"><span class="txt">특수 지령 (2회)</span></label>
        <label class="list_item"><input type="checkbox" class="chk" data-type="daily" data-id="d3"><span class="txt">수련의 탑 (엘리언/하둠/혼돈)</span></label>
        <label class="list_item"><input type="checkbox" class="chk" data-type="daily" data-id="d4"><span class="txt">흑정령 의뢰 2종 완료</span></label>
        <label class="list_item"><input type="checkbox" class="chk" data-type="daily" data-id="d5"><span class="txt">길드 의뢰 완료</span></label>
        <label class="list_item"><input type="checkbox" class="chk" data-type="daily" data-id="d6"><span class="txt">파트리지오 상점 확인</span></label>
        <label class="list_item"><input type="checkbox" class="chk" data-type="daily" data-id="d7"><span class="txt">월드 경영 진행</span></label>
    </div>

    <!-- 2. 주간 숙제 -->
    <div class="cate_bar">📅 주간 숙제 <span class="reset_info">매주 월요일 초기화</span></div>
    <div id="weekly_list">
        <label class="list_item"><input type="checkbox" class="chk" data-type="weekly" data-id="w1"><span class="txt">의형제 토벌</span></label>
        <label class="list_item"><input type="checkbox" class="chk" data-type="weekly" data-id="w2"><span class="txt">라밤의 시련</span></label>
        <label class="list_item"><input type="checkbox" class="chk" data-type="weekly" data-id="w3"><span class="txt">아토락시온 (2회)</span></label>
        <label class="list_item"><input type="checkbox" class="chk" data-type="weekly" data-id="w4"><span class="txt">셰레칸의 땅 주간 의뢰</span></label>
        <label class="list_item"><input type="checkbox" class="chk" data-type="weekly" data-id="w5"><span class="txt">끝 없는 겨울의 산 주간 의뢰</span></label>
        <label class="list_item"><input type="checkbox" class="chk" data-type="weekly" data-id="w6"><span class="txt">태양의 전장 (2승)</span></label>
        <label class="list_item"><input type="checkbox" class="chk" data-type="weekly" data-id="w7"><span class="txt">협동 토벌대 (가모스/오핀 등)</span></label>
        <label class="list_item"><input type="checkbox" class="chk" data-type="weekly" data-id="w8"><span class="txt">대사막 정제수 소모 (1시간)</span></label>
        <label class="list_item"><input type="checkbox" class="chk" data-type="weekly" data-id="w9"><span class="txt">파트리지오 & 루시 벤쿰 납품 (3종)</span></label>
        <label class="list_item"><input type="checkbox" class="chk" data-type="weekly" data-id="w10"><span class="txt">아르옐리의 틈 파견</span></label>
        <label class="list_item"><input type="checkbox" class="chk" data-type="weekly" data-id="w11"><span class="txt">영광의 길 (5회)</span></label>
        <label class="list_item"><input type="checkbox" class="chk" data-type="weekly" data-id="w12"><span class="txt">혼돈의 균열 두루마리 (10장 구매)</span></label>
        <label class="list_item"><input type="checkbox" class="chk" data-type="weekly" data-id="w13"><span class="txt">검은사당 (5회)</span></label>
        <label class="list_item"><input type="checkbox" class="chk" data-type="weekly" data-id="w14"><span class="txt">수정 빙어튀김 납품</span></label>
    </div>

    <!-- 3. 월간 숙제 -->
    <div class="cate_bar">🏆 월간 숙제 <span class="reset_info">매월 1일 초기화</span></div>
    <div id="monthly_list">
        <label class="list_item"><input type="checkbox" class="chk" data-type="monthly" data-id="m1"><span class="txt">므로웨크의 미궁 (1회)</span></label>
        <label class="list_item"><input type="checkbox" class="chk" data-type="monthly" data-id="m2"><span class="txt">대사막 사원 및 신기루 완료</span></label>
    </div>

    <div class="footer">
        <button class="reset_btn" onclick="allClear()">모든 데이터 초기화</button>
    </div>
</div>

<script>
    (function() {
        var STORAGE_KEY = 'BDM_ADVENTURER_TASKS_V1';
        var now = new Date();
        
        // 리셋 판단용 키 생성
        var dK = now.getFullYear()+'-'+(now.getMonth()+1)+'-'+now.getDate(); // 일간
        var mK = now.getFullYear()+'-'+(now.getMonth()+1); // 월간
        var dNum = now.getDay(), diff = now.getDate() - dNum + (dNum == 0 ? -6 : 1);
        var mon = new Date(now.setDate(diff));
        var wK = mon.getFullYear()+'-'+(mon.getMonth()+1)+'-'+mon.getDate(); // 주간(월요일)

        var saved = localStorage.getItem(STORAGE_KEY);
        var data = saved ? JSON.parse(saved) : {lr:{}, tk:{}};

        function resetTasks(type) {
            var el = document.getElementsByClassName('chk');
            for(var i=0; i<el.length; i++) {
                if(el[i].getAttribute('data-type') === type) {
                    delete data.tk[el[i].getAttribute('data-id')];
                }
            }
        }

        // 기간 만료 리셋 실행
        if(data.lr.d !== dK) { resetTasks('daily'); data.lr.d = dK; }
        if(data.lr.w !== wK) { resetTasks('weekly'); data.lr.w = wK; }
        if(data.lr.m !== mK) { resetTasks('monthly'); data.lr.m = mK; }

        // 이벤트 바인딩 및 데이터 로드
        var chks = document.getElementsByClassName('chk');
        for(var i=0; i<chks.length; i++) {
            (function(c){
                var id = c.getAttribute('data-id');
                if(data.tk[id]) c.checked = true;
                c.onchange = function() {
                    data.tk[id] = this.checked;
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
                };
            })(chks[i]);
        }
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));

        window.allClear = function() {
            if(confirm('모든 기록을 삭제할까요?')) {
                localStorage.removeItem(STORAGE_KEY);
                location.reload();
            }
        };
    })();
</script>

</body>
</html>
