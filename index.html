<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>검사모 통합 가이드 체크리스트</title>
    <link rel="shortcut icon" href="https://s1.blackdesertm.com/KR/Forum/BDM/Upload/WIKI/c0e9e49633320260310185122615.png">
    <style>
        /* [필수 규칙] 레이아웃 안정성 및 둥근 테두리 */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; padding: 10px; background-color: transparent; font-family: 'Malgun Gothic', sans-serif; overflow-x: hidden; }
        
        .container { 
            width: 100%; max-width: 880px; margin: 0 auto; 
            background: #fff; border: 2px solid #d4af37; border-radius: 16px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.15); display: flex; flex-direction: column;
            overflow: hidden;
        }
        
        .header { background: linear-gradient(135deg, #4e342e 0%, #212121 100%); padding: 12px; text-align: center; border-bottom: 3px solid #d4af37; }
        .header h1 { margin: 0; font-size: 18px; color: #ffffff; letter-spacing: 1px; }
        .status_bar { background: #2d2d2d; color: #d4af37; font-size: 11px; padding: 5px; text-align: center; border-bottom: 1px solid #444; }

        .content_wrap { display: flex; flex-wrap: wrap; width: 100%; background: #fff; }
        .column { flex: 1 1 31%; min-width: 280px; border-right: 1px solid #e0e0e0; display: flex; flex-direction: column; padding-bottom: 5px; }
        .column:last-child { border-right: none; }
        
        .cate_bar { background: #f8f5f0; padding: 10px; border-bottom: 2px solid #d4af37; text-align: center; position: relative; }
        .cate_title { font-size: 15px; font-weight: bold; color: #5d4037; }
        .add_btn { position: absolute; right: 8px; top: 8px; background: #8c5326; color: #fff; border: none; border-radius: 4px; width: 22px; height: 22px; cursor: pointer; font-size: 16px; }

        .list_item { display: flex; align-items: center; padding: 7px 10px; border-bottom: 1px solid #f1f1f1; position: relative; gap: 5px; }
        .list_item:hover { background: #fffcf0; }
        
        input[type="checkbox"] { width: 19px; height: 19px; cursor: pointer; accent-color: #8c5326; flex-shrink: 0; }
        .txt { font-size: 14px; color: #333; font-weight: bold; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        input:checked + .txt { color: #bdbdbd; text-decoration: line-through; font-weight: normal; }

        /* 가이드 버튼 [?] */
        .guide_btn { 
            display: inline-flex; align-items: center; justify-content: center;
            width: 20px; height: 20px; background: #e0e7ff; color: #4338ca; 
            text-decoration: none; border-radius: 50%; font-size: 12px; font-weight: bold;
            transition: 0.2s; flex-shrink: 0;
        }
        .guide_btn:hover { background: #4338ca; color: #fff; }

        /* 삭제 버튼 [X] */
        .del_btn { color: #ddd; cursor: pointer; font-size: 13px; padding: 2px 5px; opacity: 0; transition: 0.1s; flex-shrink: 0; }
        .list_item:hover .del_btn { opacity: 1; }
        .del_btn:hover { color: #ff5252; }
        
        .footer { background: #f8f8f8; padding: 10px; text-align: center; border-top: 1px solid #eee; }
        .btn_group { display: flex; justify-content: center; gap: 8px; }
        .f_btn { border: none; padding: 6px 15px; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: bold; color: #fff; }
        .btn_reset { background: #607d8b; }
        .btn_restore { background: #a1887f; }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><h1>📜 모험가 가이드 체크리스트</h1></div>
    <div class="status_bar">매일/매주 월요일/매월 1일 00시에 자동으로 초기화됩니다.</div>
    <div class="content_wrap">
        <div class="column">
            <div class="cate_bar"><span class="cate_title">☀️ 일일 콘텐츠</span><button class="add_btn" onclick="addNew('daily')">+</button></div>
            <div id="list-daily"></div>
        </div>
        <div class="column">
            <div class="cate_bar"><span class="cate_title">📅 주간 콘텐츠</span><button class="add_btn" onclick="addNew('weekly')">+</button></div>
            <div id="list-weekly"></div>
        </div>
        <div class="column">
            <div class="cate_bar"><span class="cate_title">🏆 월간 콘텐츠</span><button class="add_btn" onclick="addNew('monthly')">+</button></div>
            <div id="list-monthly"></div>
        </div>
    </div>
    <div class="footer">
        <div class="btn_group">
            <button class="f_btn btn_reset" onclick="clearChecks()">체크 해제</button>
            <button class="f_btn btn_restore" onclick="restoreDefault()">기본 목록 복구</button>
        </div>
    </div>
</div>

<script>
    const STORAGE_KEY = 'BDM_GUIDE_CUSTOM_V2';
    const FORUM_BASE = 'https://forum.blackdesertm.com/Board/Detail?boardNo=7&contentNo=';

    // 기본 숙제 리스트 + 가이드 링크 (포럼 번호 매칭)
    const defaultTasks = [
        // 일일 (10개)
        {type:'daily', txt:'모험의 열기', url: FORUM_BASE+'562369'}, 
        {type:'daily', txt:'특수 지령', url: FORUM_BASE+'28'},
        {type:'daily', txt:'파트리지오 특별 상점', url: FORUM_BASE+'504815'},
        {type:'daily', txt:'수련의 탑', url: FORUM_BASE+'504810'},
        {type:'daily', txt:'월드 경영', url: FORUM_BASE+'504814'},
        {type:'daily', txt:'흑정령 의뢰 2종', url: FORUM_BASE+'504811'},
        {type:'daily', txt:'길드 의뢰', url: FORUM_BASE+'504822'},
        {type:'daily', txt:'친구 인사', url: ''},
        {type:'daily', txt:'순위 찬사', url: ''},
        {type:'daily', txt:'요정의 요람', url: FORUM_BASE+'546410'},
        // 주간 (17개)
        {type:'weekly', txt:'겨울산 주간 의뢰', url: FORUM_BASE+'564560'},
        {type:'weekly', txt:'셰레칸의 땅 주간 의뢰', url: FORUM_BASE+'576880'},
        {type:'weekly', txt:'대사막 정제수 소모', url: FORUM_BASE+'504820'},
        {type:'weekly', txt:'혼돈의 균열', url: FORUM_BASE+'504813'},
        {type:'weekly', txt:'검은 사당 5회', url: FORUM_BASE+'567810'},
        {type:'weekly', txt:'라밤의 시련', url: FORUM_BASE+'523410'},
        {type:'weekly', txt:'아토락시온 2회', url: FORUM_BASE+'534560'},
        {type:'weekly', txt:'영광의 길 (5회)', url: FORUM_BASE+'504816'},
        {type:'weekly', txt:'의형제 토벌', url: FORUM_BASE+'504818'},
        {type:'weekly', txt:'태양의 전장 2승', url: FORUM_BASE+'504819'},
        {type:'weekly', txt:'협동 토벌대 완료', url: FORUM_BASE+'512345'},
        {type:'weekly', txt:'아르옐리의 틈', url: FORUM_BASE+'512346'},
        {type:'weekly', txt:'파트리&루시 납품', url: ''},
        {type:'weekly', txt:'월드 우두머리 흔적', url: ''},
        {type:'weekly', txt:'뒤틀린 악몽 흔적', url: ''},
        {type:'weekly', txt:'어둠의 틈 흔적', url: ''},
        {type:'weekly', txt:'빙어튀김 납품', url: ''},
        // 월간 (3개)
        {type:'monthly', txt:'므로웨크의 미궁', url: FORUM_BASE+'567110'},
        {type:'monthly', txt:'대사막 사원/신기루', url: FORUM_BASE+'504820'},
        {type:'monthly', txt:'대전 도전과제', url: ''}
    ];

    let state = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {
        tasks: JSON.parse(JSON.stringify(defaultTasks)),
        checked: {},
        lastReset: {d:'', w:'', m:''}
    };

    function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

    function render() {
        ['daily', 'weekly', 'monthly'].forEach(type => {
            const container = document.getElementById('list-' + type);
            container.innerHTML = '';
            state.tasks.filter(t => t.type === type).forEach(task => {
                const isChecked = state.checked[task.txt] ? 'checked' : '';
                const guideLink = task.url ? `<a href="${task.url}" target="_blank" class="guide_btn" title="가이드 보기">?</a>` : '';
                container.innerHTML += `
                    <div class="list_item">
                        <input type="checkbox" ${isChecked} onchange="toggleCheck('${task.txt}', this.checked)">
                        <span class="txt">${task.txt}</span>
                        ${guideLink}
                        <span class="del_btn" onclick="removeTask('${task.txt}')">✕</span>
                    </div>`;
            });
        });
    }

    function checkReset() {
        const now = new Date();
        const dK = now.getFullYear()+'-'+(now.getMonth()+1)+'-'+now.getDate();
        const mK = now.getFullYear()+'-'+(now.getMonth()+1);
        const day = now.getDay(), diff = now.getDate() - day + (day == 0 ? -6 : 1);
        const mon = new Date(now.setDate(diff));
        const wK = mon.getFullYear()+'-'+(mon.getMonth()+1)+'-'+mon.getDate();

        if(state.lastReset.d !== dK) { resetChecks('daily'); state.lastReset.d = dK; }
        if(state.lastReset.w !== wK) { resetChecks('weekly'); state.lastReset.w = wK; }
        if(state.lastReset.m !== mK) { resetChecks('monthly'); state.lastReset.m = mK; }
        save();
    }

    function resetChecks(type) {
        state.tasks.filter(t => t.type === type).forEach(t => delete state.checked[t.txt]);
    }

    function toggleCheck(txt, val) { state.checked[txt] = val; save(); }

    function addNew(type) {
        const txt = prompt('숙제 이름을 입력하세요:');
        if(!txt) return;
        if(state.tasks.find(t => t.txt === txt)) { alert('이미 존재하는 이름입니다.'); return; }
        
        const url = prompt('가이드 링크 주소를 입력하세요 (없으면 취소):', 'https://');
        state.tasks.push({type, txt, url: (url === 'https://' ? '' : url)});
        save(); render();
    }

    function removeTask(txt) {
        if(confirm(`'${txt}' 숙제를 삭제할까요?`)) {
            state.tasks = state.tasks.filter(t => t.txt !== txt);
            delete state.checked[txt];
            save(); render();
        }
    }

    function clearChecks() {
        if(confirm('모든 체크를 해제하시겠습니까?')) {
            state.checked = {}; save(); render();
        }
    }

    function restoreDefault() {
        if(confirm('기본 목록으로 복구하시겠습니까? (추가한 항목은 삭제됩니다)')) {
            state.tasks = JSON.parse(JSON.stringify(defaultTasks));
            state.checked = {};
            save(); render();
        }
    }

    checkReset();
    render();
</script>
</body>
</html>
