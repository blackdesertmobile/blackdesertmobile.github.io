<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>새내기 모험가 체크리스트</title>
    <link rel="shortcut icon" href="https://s1.blackdesertm.com/KR/Forum/BDM/Upload/WIKI/c0e9e49633320260310185122615.png">
    <style>
        /* [필수 규칙] 레이아웃 안정성 및 둥근 테두리 */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; padding: 10px; background-color: transparent; font-family: 'Malgun Gothic', sans-serif; overflow-x: hidden; }
        
        .container { 
            width: 100%; max-width: 880px; margin: 0 auto; 
            background: #fff; border: 2px solid #d4af37; border-radius: 16px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.15); display: flex; flex-direction: column;
            overflow: hidden;
        }
        
        .header { background: linear-gradient(135deg, #4e342e 0%, #212121 100%); padding: 12px; text-align: center; border-bottom: 3px solid #d4af37; }
        .header h1 { margin: 0; font-size: 18px; color: #ffffff; letter-spacing: 1px; }
        .status_bar { background: #2d2d2d; color: #d4af37; font-size: 11px; padding: 5px; text-align: center; border-bottom: 1px solid #444; }

        .content_wrap { display: flex; flex-wrap: wrap; width: 100%; background: #fff; }
        .column { flex: 1 1 31%; min-width: 280px; border-right: 1px solid #e0e0e0; display: flex; flex-direction: column; padding-bottom: 5px; }
        .column:last-child { border-right: none; }
        
        .cate_bar { background: #f8f5f0; padding: 10px; border-bottom: 2px solid #d4af37; text-align: center; position: relative; }
        .cate_title { font-size: 15px; font-weight: bold; color: #5d4037; }
        .add_btn { position: absolute; right: 8px; top: 8px; background: #8c5326; color: #fff; border: none; border-radius: 4px; width: 22px; height: 22px; cursor: pointer; font-size: 16px; }

        .list_item { display: flex; align-items: center; padding: 7px 10px; border-bottom: 1px solid #f1f1f1; position: relative; gap: 5px; }
        .list_item:hover { background: #fffcf0; }
        
        input[type="checkbox"] { width: 19px; height: 19px; cursor: pointer; accent-color: #8c5326; flex-shrink: 0; }
        .txt { font-size: 14px; color: #333; font-weight: bold; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        input:checked + .txt { color: #bdbdbd; text-decoration: line-through; font-weight: normal; }

        /* 가이드 버튼 [?] */
        .guide_btn { 
            display: inline-flex; align-items: center; justify-content: center;
            width: 20px; height: 20px; background: #e0e7ff; color: #4338ca; 
            text-decoration: none; border-radius: 50%; font-size: 12px; font-weight: bold;
            transition: 0.2s; flex-shrink: 0;
        }
        .guide_btn:hover { background: #4338ca; color: #fff; }

        /* 삭제 버튼 [X] */
        .del_btn { color: #ddd; cursor: pointer; font-size: 13px; padding: 2px 5px; opacity: 0; transition: 0.1s; flex-shrink: 0; }
        .list_item:hover .del_btn { opacity: 1; }
        .del_btn:hover { color: #ff5252; }
        
        .footer { background: #f8f8f8; padding: 10px; text-align: center; border-top: 1px solid #eee; }
        .btn_group { display: flex; justify-content: center; gap: 8px; }
        .f_btn { border: none; padding: 6px 15px; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: bold; color: #fff; }
        .btn_reset { background: #607d8b; }
        .btn_restore { background: #a1887f; }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><h1>📜 새내기 모험가 체크리스트</h1></div>
    <div class="status_bar">매일/매주 월요일/매월 1일 00시에 자동으로 초기화됩니다.</div>
    <div class="content_wrap">
        <div class="column">
            <div class="cate_bar"><span class="cate_title">☀️ 일일 콘텐츠</span><button class="add_btn" onclick="addNew('daily')">+</button></div>
            <div id="list-daily"></div>
        </div>
        <div class="column">
            <div class="cate_bar"><span class="cate_title">📅 주간 콘텐츠</span><button class="add_btn" onclick="addNew('weekly')">+</button></div>
            <div id="list-weekly"></div>
        </div>
        <div class="column">
            <div class="cate_bar"><span class="cate_title">🏆 월간 콘텐츠</span><button class="add_btn" onclick="addNew('monthly')">+</button></div>
            <div id="list-monthly"></div>
        </div>
    </div>
    <div class="footer">
        <div class="btn_group">
            <button class="f_btn btn_reset" onclick="clearChecks()">체크 해제</button>
            <button class="f_btn btn_restore" onclick="restoreDefault()">기본 목록 복구</button>
        </div>
    </div>
</div>

<script>
    const STORAGE_KEY = 'BDM_GUIDE_CUSTOM_V2';
    const FORUM_BASE = 'https://forum.blackdesertm.com/Board/Detail?boardNo=7&contentNo=';

    // 기본 숙제 리스트 + 가이드 링크 (포럼 번호 매칭)
    const defaultTasks = [
        // 일일 (10개)
        {type:'daily', txt:'모험의 열기', url: 'https://www.blackdesertm.com/Ocean/Wiki?wikiNo=111111101'}, 
        {type:'daily', txt:'특수 지령', url: ''},
        {type:'daily', txt:'파트리지오 특별 상점', url: 'https://www.blackdesertm.com/Ocean/Wiki?wikiNo=1111118'},
        {type:'daily', txt:'수련의 탑', url: 'https://www.blackdesertm.com/Ocean/Wiki?wikiNo=1000201'},
        {type:'daily', txt:'월드 경영', url: 'https://www.blackdesertm.com/Ocean/Wiki?wikiNo=3037'},
        {type:'daily', txt:'일반/하둠 흑정령 의뢰', url: 'https://www.blackdesertm.com/Ocean/Wiki?wikiNo=11111115'},
        {type:'daily', txt:'길드 의뢰', url: 'https://www.blackdesertm.com/Ocean/Wiki?wikiNo=3031#:~:text=%EC%95%88%EB%82%B4%20%EB%AC%B8%EA%B5%AC%EA%B0%80%20%ED%91%9C%EC%8B%9C%EB%90%A9%EB%8B%88%EB%8B%A4.-,%EA%B8%B8%EB%93%9C%20%EC%9D%98%EB%A2%B0%EB%8A%94,-%EB%A7%A4%EC%9D%BC%203%ED%9A%8C%EC%94%A9'},
        {type:'daily', txt:'친구 인사', url: ''},
        {type:'daily', txt:'순위 찬사', url: 'https://www.blackdesertm.com/Ocean/Wiki?wikiNo=1111117'},
        {type:'daily', txt:'지식의 도서관', url: 'https://forum.blackdesertm.com/Board/Detail?boardNo=7&contentNo=647367#:~:text=%EC%84%A0%ED%83%9D%ED%95%A0%20%EC%88%98%20%EC%9E%88%EC%8A%B5%EB%8B%88%EB%8B%A4.-,%EC%B9%BC%ED%8E%98%EC%98%A8%20%EC%A7%80%EC%8B%9D%20%EB%8F%84%EC%84%9C%EA%B4%80,-%EA%B0%9C%EB%B0%9C%EC%9E%90%20%EC%BD%94%EB%A9%98%ED%8A%B8'},
        {type:'daily', txt:'요정 교감(대화/의뢰/탐구)', url: 'https://www.blackdesertm.com/Ocean/Wiki?wikiNo=4014#:~:text=%ED%9A%8D%EB%93%9D%ED%95%A0%20%EC%88%98%20%EC%9E%88%EC%8A%B5%EB%8B%88%EB%8B%A4.-,%EC%9A%94%EC%A0%95%EC%9D%98%20%EB%B6%80%ED%83%81,-%ED%9D%A5%EB%AF%B8%EB%8F%84%2075%20%EC%86%8C%EB%AA%A8'},
        {type:'daily', txt:'요정의 요람', url: 'https://www.blackdesertm.com/Ocean/Wiki?wikiNo=4014#:~:text=%EC%86%8C%EB%A7%9D%EC%9D%98%20%EC%84%B1%EC%84%9D%2C%20%EB%B3%84%EB%A7%9E%EC%9D%B4%EA%BD%83-,%EC%9A%94%EC%A0%95%EC%9D%98%20%EC%9A%94%EB%9E%8C,-%EA%B0%9C%EB%B0%9C%EC%9E%90%20%EC%BD%94%EB%A9%98%ED%8A%B8'},
        // 주간 (17개)
        {type:'weekly', txt:'설산-용병 게시판 의뢰', url: 'https://www.blackdesertm.com/Ocean/Wiki?wikiNo=100085'},
        {type:'weekly', txt:'셰레칸의 땅-소집 공고 의뢰', url: 'https://www.blackdesertm.com/Ocean/Wiki?wikiNo=130001#:~:text=%ED%83%9C%EC%97%BD%20%EC%83%81%EC%9E%90%EB%A5%BC%20%ED%9A%8D%EB%93%9D%ED%95%98%EB%8A%94-,%EC%86%8C%EC%A7%91%20%EA%B3%B5%EA%B3%A0,-%EC%85%B0%EB%A0%88%EC%B9%B8%EC%9D%98%20%EB%95%85%20%EB%A7%88%EC%9D%84%EB%A7%88%EB%8B%A4'},
        {type:'weekly', txt:'대사막 정제수 소모', url: 'https://www.blackdesertm.com/Ocean/Wiki?wikiNo=100012'},
        {type:'weekly', txt:'혼돈의 균열(두루마리 구매)', url: 'https://www.blackdesertm.com/Ocean/Wiki?wikiNo=100015'},
        {type:'weekly', txt:'검은 사당 5회', url: 'https://www.blackdesertm.com/Ocean/Wiki?wikiNo=100057'},
        {type:'weekly', txt:'라밤의 시련', url: 'https://www.blackdesertm.com/Ocean/Wiki?wikiNo=900050'},
        {type:'weekly', txt:'아토락시온 2회', url: 'https://www.blackdesertm.com/Ocean/Wiki?wikiNo=11111116'},
        {type:'weekly', txt:'영광의 길 (5회)', url: 'https://www.blackdesertm.com/Ocean/Wiki?wikiNo=3027'},
        {type:'weekly', txt:'의형제 토벌', url: 'https://www.blackdesertm.com/Ocean/Wiki?wikiNo=3070#:~:text=%EC%98%86%EC%9C%BC%EB%A1%9C%20%EC%9D%B4%EB%8F%99%ED%95%98%EA%B2%8C%20%EB%90%A9%EB%8B%88%EB%8B%A4.-,%E2%96%A0%20%EC%9D%98%ED%98%95%EC%A0%9C%20%ED%86%A0%EB%B2%8C,-%2D%20%EC%9D%98%ED%98%95%EC%A0%9C%20%ED%86%A0%EB%B2%8C%EC%9D%80%20%EC%9D%98%ED%98%95%EC%A0%9C%EB%A5%BC'},
        {type:'weekly', txt:'태양의 전장 2승', url: 'https://www.blackdesertm.com/Ocean/Wiki?wikiNo=3065'},
        {type:'weekly', txt:'협동 토벌대 완료', url: 'https://www.blackdesertm.com/Ocean/Wiki?wikiNo=3090'},
        {type:'weekly', txt:'아르옐리의 틈', url: 'https://www.blackdesertm.com/Ocean/Wiki?wikiNo=1041'},
        {type:'weekly', txt:'파트리지오&루시 벤쿰 납품', url: 'https://www.blackdesertm.com/Ocean/Wiki?wikiNo=900012'},
        {type:'weekly', txt:'월드 우두머리 흔적', url: 'https://www.blackdesertm.com/Ocean/Wiki?wikiNo=104'},
        {type:'weekly', txt:'뒤틀린 악몽 흔적', url: 'https://www.blackdesertm.com/Ocean/Wiki?wikiNo=11111114'},
        {type:'weekly', txt:'어둠의 틈 흔적', url: 'https://www.blackdesertm.com/Ocean/Wiki?wikiNo=111111121'},
        {type:'weekly', txt:'수정 빙어 튀김 납품', url: ''},
        // 월간 (3개)
        {type:'monthly', txt:'므로웨크의 미궁', url: 'https://www.blackdesertm.com/Ocean/Wiki?wikiNo=100065'},
        {type:'monthly', txt:'대사막 사원/신기루', url: 'https://www.blackdesertm.com/Ocean/Wiki?wikiNo=110015'},
        {type:'monthly', txt:'대전 도전과제', url: 'https://www.blackdesertm.com/Ocean/Wiki?wikiNo=111111'}
    ];

    let state = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {
        tasks: JSON.parse(JSON.stringify(defaultTasks)),
        checked: {},
        lastReset: {d:'', w:'', m:''}
    };

    function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

    function render() {
        ['daily', 'weekly', 'monthly'].forEach(type => {
            const container = document.getElementById('list-' + type);
            container.innerHTML = '';
            state.tasks.filter(t => t.type === type).forEach(task => {
                const isChecked = state.checked[task.txt] ? 'checked' : '';
                const guideLink = task.url ? `<a href="${task.url}" target="_blank" class="guide_btn" title="가이드 보기">?</a>` : '';
                container.innerHTML += `
                    <div class="list_item">
                        <input type="checkbox" ${isChecked} onchange="toggleCheck('${task.txt}', this.checked)">
                        <span class="txt">${task.txt}</span>
                        ${guideLink}
                        <span class="del_btn" onclick="removeTask('${task.txt}')">✕</span>
                    </div>`;
            });
        });
    }

    function checkReset() {
        const now = new Date();
        const dK = now.getFullYear()+'-'+(now.getMonth()+1)+'-'+now.getDate();
        const mK = now.getFullYear()+'-'+(now.getMonth()+1);
        const day = now.getDay(), diff = now.getDate() - day + (day == 0 ? -6 : 1);
        const mon = new Date(now.setDate(diff));
        const wK = mon.getFullYear()+'-'+(mon.getMonth()+1)+'-'+mon.getDate();

        if(state.lastReset.d !== dK) { resetChecks('daily'); state.lastReset.d = dK; }
        if(state.lastReset.w !== wK) { resetChecks('weekly'); state.lastReset.w = wK; }
        if(state.lastReset.m !== mK) { resetChecks('monthly'); state.lastReset.m = mK; }
        save();
    }

    function resetChecks(type) {
        state.tasks.filter(t => t.type === type).forEach(t => delete state.checked[t.txt]);
    }

    function toggleCheck(txt, val) { state.checked[txt] = val; save(); }

    function addNew(type) {
        const txt = prompt('추가할 콘텐츠 이름을 입력해주세요.:');
        if(!txt) return;
        if(state.tasks.find(t => t.txt === txt)) { alert('이미 존재하는 이름입니다.'); return; }
        
        const url = prompt('가이드 링크 주소를 입력하세요 (없으면 취소로 건너뛰기):', 'https://');
        state.tasks.push({type, txt, url: (url === 'https://' ? '' : url)});
        save(); render();
    }

    function removeTask(txt) {
        if(confirm(`'${txt}' 해당 콘텐츠를 삭제할까요?`)) {
            state.tasks = state.tasks.filter(t => t.txt !== txt);
            delete state.checked[txt];
            save(); render();
        }
    }

    function clearChecks() {
        if(confirm('모든 체크를 해제하시겠습니까?')) {
            state.checked = {}; save(); render();
        }
    }

    function restoreDefault() {
        if(confirm('기본 목록으로 복구하시겠습니까? (추가한 항목은 삭제됩니다)')) {
            state.tasks = JSON.parse(JSON.stringify(defaultTasks));
            state.checked = {};
            save(); render();
        }
    }

    checkReset();
    render();
</script>
</body>
</html>
